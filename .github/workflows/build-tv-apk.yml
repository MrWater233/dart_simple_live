name: Build TV APK
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "构建分支"
        required: true
        default: "master"
        type: choice
        options:
          - master
          - dev

jobs:
  build-tv-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # 签出代码
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      # APK签名设置
      - name: Download Android keystore
        id: android_tv_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: keystore.jks
          encodedString: ${{ secrets.TV_KEYSTORE_BASE64 }}
      - name: Create key.properties
        run: |
          echo "storeFile=${{ steps.android_tv_keystore.outputs.filePath }}" > simple_live_tv_app/android/key.properties
          echo "storePassword=${{ secrets.TV_STORE_PASSWORD }}" >> simple_live_tv_app/android/key.properties
          echo "keyPassword=${{ secrets.TV_KEY_PASSWORD }}" >> simple_live_tv_app/android/key.properties
          echo "keyAlias=${{ secrets.TV_KEY_ALIAS }}" >> simple_live_tv_app/android/key.properties

      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # 更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_tv_app
          flutter pub get

      # 打包通用APK
      - name: Build Universal APK
        run: |
          cd simple_live_tv_app
          flutter build apk --release

      # 打包分架构APK
      - name: Build Split APKs
        run: |
          cd simple_live_tv_app
          flutter build apk --release --split-per-abi

      # 查看APK信息
      - name: Dump APK info
        run: |
          AAPT=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/aapt
          APK=simple_live_tv_app/build/app/outputs/flutter-apk/app-release.apk
          echo "=== APK badging ==="
          $AAPT dump badging "$APK" | grep -E "sdkVersion|targetSdkVersion|uses-feature|package:"

      # 使用apksigner重签名（强制V1+V2签名）
      - name: Re-sign APKs with V1+V2
        run: |
          APKSIGNER=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner
          KS=${{ steps.android_tv_keystore.outputs.filePath }}
          for APK in simple_live_tv_app/build/app/outputs/flutter-apk/app-*release.apk; do
            echo "Re-signing: $APK"
            $APKSIGNER sign \
              --ks "$KS" \
              --ks-key-alias "${{ secrets.TV_KEY_ALIAS }}" \
              --ks-pass "pass:${{ secrets.TV_STORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.TV_KEY_PASSWORD }}" \
              --v1-signing-enabled true \
              --v2-signing-enabled true \
              --min-sdk-version 21 \
              "$APK"
            echo "=== Verify: $APK ==="
            $APKSIGNER verify --verbose "$APK"
          done

      # 上传APK至Artifacts
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tv-apk-${{ inputs.branch }}
          path: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
